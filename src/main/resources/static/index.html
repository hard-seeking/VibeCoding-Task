<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选课管理系统（简易版）</title>
    <style>
        body { font-family: "Segoe UI", "Microsoft YaHei", sans-serif; margin: 24px; color: #222; }
        h1 { font-size: 20px; }
        textarea { width: 100%; height: 160px; box-sizing: border-box; font-family: monospace; }
        .row { margin: 12px 0; }
        button { padding: 6px 16px; cursor: pointer; }
        input[type=text] { padding: 6px; width: 280px; }
        table { border-collapse: collapse; width: 100%; margin-top: 8px; }
        th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; font-size: 14px; }
        th { background: #f2f4f7; }
        .group-title { margin-top: 20px; font-weight: bold; color: #1a5fb4; }
        .hint { color: #888; font-size: 13px; }
        .error { color: #c01c28; }
    </style>
</head>
<body>
    <h1>选课管理系统（简易版）</h1>

    <div class="row">
        <div class="hint">每行一条，格式：学生ID,课程ID,课程名称,课程类型（公共课/专业课/选修课）</div>
        <textarea id="csv" placeholder="S000001,C000001,Java程序设计,专业课"></textarea>
    </div>
    <div class="row">
        <button onclick="doImport()">导入处理</button>
    </div>

    <div class="row">
        <input type="text" id="keyword" placeholder="按 学生ID/课程ID/课程名/类型 检索">
        <button onclick="doSearch()">搜索</button>
        <button onclick="showAll()">显示全部</button>
    </div>

    <div id="message" class="row"></div>
    <div id="result"></div>

    <script src="/app.js"></script>
</body>
</html>
